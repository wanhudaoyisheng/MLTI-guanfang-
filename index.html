<head>

    <style>
        :root {
            --bg: #2c2418;
            --card: #fef7e8;
            --text: #3f3324;
            --sub: #6b4e2e;
            --accent: #a6743c;
            --light: #ecdcaa;
            --border: #dac29c;
        }
        [dark-mode="on"] {
            --bg: #1a1611;
            --card: #2a241c;
            --text: #e9dfc7;
            --sub: #c2b49c;
            --accent: #d49a5f;
            --light: #5c4b36;
            --border: #554634;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background 0.3s, color 0.2s, border-color 0.3s;
        }
        body {
            background: var(--bg);
            font-family: 'Noto Serif SC', serif;
            padding: 12px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .dark-toggle {
            position: fixed;
            top: 12px;
            right: 12px;
            background: var(--accent);
            color: #fff;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            z-index: 999;
        }
        .test-container {
            max-width: 680px;
            width: 100%;
            background: var(--card);
            border-radius: 4px 4px 24px 24px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            overflow: hidden;
            border: 1px solid var(--border);
            position: relative;
        }
        .progress-area {
            background: #2e241a;
            padding: 12px 20px 8px;
            border-bottom: 1px solid var(--border);
        }
        .progress-thermal {
            background: #2b211a;
            height: 12px;
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ba7a3a, #e0a56e, #f5c28e);
            border-radius: 20px;
            transition: width 0.4s;
        }
        .progress-msg {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.7rem;
            color: #e9cf9e;
        }
        .question-area {
            padding: 28px 26px;
            color: var(--text);
        }
        .step-counter {
            font-size: 0.7rem;
            color: var(--sub);
            letter-spacing: 2px;
            margin-bottom: 12px;
            border-left: 2px solid var(--accent);
            padding-left: 12px;
        }
        .epigraph {
            background: rgba(0,0,0,0.05);
            padding: 18px;
            border-left: 4px solid var(--accent);
            margin: 20px 0;
            line-height: 1.6;
            color: var(--sub);
        }
        .start-page { text-align: center; }
        .start-title { font-size: 2rem; font-weight: 800; margin: 10px 0; }
        .start-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
        }
        .scenario {
            background: rgba(0,0,0,0.05);
            padding: 14px;
            border-left: 4px solid var(--accent);
            margin: 16px 0;
        }
        .question-text { font-size: 1.1rem; font-weight: 600; margin: 12px 0; }
        .option-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid var(--border);
            padding: 16px;
            margin-bottom: 10px;
            border-radius: 10px;
            cursor: pointer;
        }
        .option-btn.selected {
            background: var(--light);
            border-color: var(--accent);
        }
        .nav-buttons {
            display: flex;
            gap: 16px;
            margin-top: 24px;
        }
        .nav-btn {
            flex:1;
            padding:12px;
            border-radius:30px;
            border:1px solid var(--border);
            background: var(--light);
            cursor: pointer;
        }
        .nav-btn.primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .nav-btn:disabled { opacity:0.4; cursor:not-allowed; }
        .result-container { text-align: center; }
        .portrait {
            width:120px; height:120px;
            margin:0 auto 16px;
            border-radius:50%;
            overflow:hidden;
            border:3px solid var(--border);
        }
        .portrait img { width:100%; height:100%; object-fit:cover; }
        .result-writer { font-size:2rem; font-weight:800; }
        .result-tag { font-size:1.2rem; color:var(--accent); margin:8px 0; }
        .result-badge {
            background: var(--light);
            padding:6px 16px;
            border-radius:20px;
            font-size:0.9rem;
            font-weight:500;
            display:inline-block;
            margin-bottom:12px;
        }
        .result-desc {
            text-align:left;
            padding:20px;
            background: rgba(0,0,0,0.04);
            border-radius:10px;
            margin:16px 0;
        }
        .six-dim {
            background: rgba(0,0,0,0.03);
            border-radius: 12px;
            padding: 16px;
            margin: 16px 0;
            text-align: left;
        }
        .dim-item {
            margin-bottom: 16px;
        }
        .dim-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--sub);
            margin-bottom: 4px;
        }
        .progress-bar-container {
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            margin: 6px 0;
        }
        .progress-fill-bar {
            background: var(--accent);
            height: 100%;
            width: 0%;
            border-radius: 10px;
            transition: width 0.5s;
        }
        .dim-percent {
            text-align: right;
            font-size: 0.7rem;
            color: var(--accent);
            font-weight: 500;
        }
        .share-card {
            margin-top:20px;
            padding:20px;
            background: var(--light);
            border-radius:16px;
            text-align:center;
        }
        .share-btn {
            margin-top:12px;
            padding:10px 20px;
            background:var(--accent);
            color:#fff;
            border:none;
            border-radius:30px;
            cursor:pointer;
        }
        .restart-btn {
            margin-top:20px;
            padding:12px 28px;
            background:var(--accent);
            color:#fff;
            border:none;
            border-radius:30px;
            cursor:pointer;
        }
        .footer-note {
            text-align:center;
            padding:14px;
            font-size:0.7rem;
            color:var(--sub);
            border-top:1px dotted var(--border);
        }
        .fade-in { animation:fadeIn 0.5s forwards; }
        @keyframes fadeIn {
            from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}
        }
    </style>
</head>

    {"dim":"character","options":[0,1,2],"text":"你看到新来的同学被排挤，你们不熟。","q":"你会？","opts":[{"val":0,"title":"当作没看见","fun":"多一事不如少一事"},{"val":1,"title":"私下说有事找我","fun":"点到为止"},{"val":2,"title":"公开制止排挤","fun":"正义使者"}]},

let currentIndex = 0;
let userAnswers = new Array(25).fill(null);
let testStarted = false;
let finalUserVec = [];
const dynamicDiv = document.getElementById("dynamicContent");
const progressFill = document.getElementById("progressFill");
const progressTextSpan = document.getElementById("progressText");

// 暗黑模式
document.getElementById("darkToggle").onclick = () => {
    const mode = document.body.getAttribute("dark-mode") === "on" ? "off" : "on";
    document.body.setAttribute("dark-mode", mode);
    document.getElementById("darkToggle").innerText = mode === "on" ? "☀️" : "🌙";
};

function updateProgress() {
    if (!testStarted) {
        progressFill.style.width = "0%";
        progressTextSpan.innerText = "未开始";
        return;
    }
    const answered = userAnswers.filter(x => x !== null).length;
    const pct = (answered / 25) * 100;
    progressFill.style.width = pct + "%";
    if (answered === 0) progressTextSpan.innerText = "📭 尚未落笔";
    else if (answered < 8) progressTextSpan.innerText = `✍️ 已答 ${answered} 题 · 墨迹初显`;
    else if (answered < 18) progressTextSpan.innerText = `📜 已答 ${answered} 题 · 文心渐明`;
    else if (answered < 25) progressTextSpan.innerText = `🎋 已答 ${answered} 题 · 即将破茧`;
    else progressTextSpan.innerText = "⚡ 全部答完 · 查看结果";
}

function renderStartPage() {
    testStarted = false;
    updateProgress();
    dynamicDiv.innerHTML = `
    <div class="question-area start-page fade-in">
        <div style="font-size:2.5rem; margin:10px">📜✨</div>
        <div class="start-title">现代文学人格测试</div>
        <div style="margin:10px; color:var(--sub)">六维坐标 · 民国文气</div>
        <div class="epigraph">
            “远去的文学是隐蔽在幽暗里的微光，一旦召回，我们便被沐浴在神奇的色泽里。<br>
            文学史不都是知识的罗列，还有精神的对话。”
            <div style="text-align:right; margin-top:8px">—— 孙郁</div>
        </div>
        <button class="start-btn" id="startBtn">开始测试</button>
    </div>`;
    document.getElementById("startBtn").onclick = () => {
        testStarted = true;
        currentIndex = 0;
        userAnswers.fill(null);
        updateProgress();
        renderCurrentQuestion();
    };
}

function renderCurrentQuestion() {
    const q = questions[currentIndex];
    const sel = userAnswers[currentIndex];
    let optsHTML = "";
    q.opts.forEach(opt => {
        const c = sel === opt.val ? "selected" : "";
        optsHTML += `
        <div class="option-btn ${c}" data-val="${opt.val}">
            <div style="font-weight: bold;">${opt.title}</div>
            <div style="font-size:0.8rem; color:var(--sub)">${opt.fun}</div>
        </div>`;
    });

    dynamicDiv.innerHTML = `
    <div class="question-area fade-in">
        <div class="step-counter">第 ${currentIndex + 1} / 25 题</div>
        <div class="scenario">${q.text}</div>
        <div class="question-text">${q.q}</div>
        ${optsHTML}
        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn" ${currentIndex === 0 ? "disabled" : ""}>上一题</button>
            <button class="nav-btn primary" id="nextBtn">${currentIndex === 24 ? "生成结果" : "下一题"}</button>
        </div>
    </div>`;

    document.querySelectorAll(".option-btn").forEach(btn => {
        btn.onclick = () => {
            userAnswers[currentIndex] = parseInt(btn.dataset.val);
            document.querySelectorAll(".option-btn").forEach(b => b.classList.remove("selected"));
            btn.classList.add("selected");
            updateProgress();
        };
    });

    document.getElementById("prevBtn").onclick = () => {
        currentIndex--;
        renderCurrentQuestion();
    };

    document.getElementById("nextBtn").onclick = () => {
        if (userAnswers[currentIndex] === null) {
            alert("请选择一个选项再继续～");
            return;
        }
        if (currentIndex === 24) {
            computeAndShowResult();
        } else {
            currentIndex++;
            renderCurrentQuestion();
        }
    };
}

async function computeAndShowResult() {
    dynamicDiv.innerHTML = `<div class="question-area" style="text-align:center; padding:60px 0;"><div style="font-size:1.4rem">正在生成你的文学人格...</div></div>`;
    await new Promise(r => setTimeout(r, 600));

    const dimSums = { orientation: 0, character: 0, style: 0, form: 0, culture: 0, function: 0 };
    const dimCounts = { orientation: 0, character: 0, style: 0, form: 0, culture: 0, function: 0 };

    for (let i = 0; i < 25; i++) {
        const dim = questions[i].dim;
        dimSums[dim] += userAnswers[i];
        dimCounts[dim]++;
    }

    finalUserVec = [
        dimSums.orientation / dimCounts.orientation,
        dimSums.character / dimCounts.character,
        dimSums.style / dimCounts.style,
        dimSums.form / dimCounts.form,
        dimSums.culture / dimCounts.culture,
        dimSums.function / dimCounts.function
    ];

    let bestWriter = null;
    let minDist = 999;
    for (const [name, coords] of Object.entries(writersData)) {
        let d = 0;
        for (let i = 0; i < 6; i++) d += Math.pow(finalUserVec[i] - coords[i], 2);
        const dist = Math.sqrt(d);
        if (dist < minDist) {
            minDist = dist;
            bestWriter = name;
        }
    }

    showResult(bestWriter, minDist);
}

function showResult(name, dist) {
    const img = writerPortrait[name];
    const rec = writerRecommend[name];
    const fitPercent = Math.min(95, Math.max(40, Math.round(100 - dist * 18)));

    let dimHtml = '';
    for (let i = 0; i < 6; i++) {
        const score = finalUserVec[i];
        const percent = Math.round((score / 2) * 100);
        const leftLabel = dimConfig[i].left;
        const rightLabel = dimConfig[i].right;

        dimHtml += `
            <div class="dim-item">
                <div class="dim-labels">
                    <span>${leftLabel}</span>
                    <span>${rightLabel}</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-fill-bar" style="width: ${percent}%;"></div>
                </div>
                <div class="dim-percent">${percent}% → ${rightLabel.split(' ')[0]}</div>
            </div>
        `;
    }

    dynamicDiv.innerHTML = `
    <div class="question-area result-container fade-in">
        <div class="step-counter">文学人格结果</div>
        <div class="portrait"><img src="${img}" alt="${name}" onerror="this.onerror=null;this.parentElement.innerHTML='<span style=\'font-size:3rem;\'>📖✨</span>'"></div>
        <div class="result-writer">${name}</div>
        <div class="result-tag">${writerTag[name]}</div>
        <div class="result-badge">人格契合度 ${fitPercent}%</div>

        <div class="six-dim">
            <div style="font-weight:bold; margin-bottom:12px;">📊 你的六维气质图谱</div>
            ${dimHtml}
        </div>

        <div class="result-desc">
            ${writerDesc[name]}
            <div style="margin-top:16px; padding-top:16px; border-top:1px dotted var(--border)">
                📚 推荐阅读：${rec.work}<br>
                ✍️ ${rec.quote}
            </div>
        </div>

        <div class="share-card">
            <div style="font-weight:bold; margin-bottom:8px;">📤 分享到朋友圈</div>
            <button class="share-btn" onclick="copyShare()">复制完整分享文案</button>
        </div>

        <button class="restart-btn" onclick="renderStart()">重新测试</button>
    </div>`;

    progressFill.style.width = "100%";
    progressTextSpan.innerText = "文格已现";
}

function copyShare() {
    const name = document.querySelector(".result-writer").innerText;
    const text = `📜 现代文学人格测试
我是【${name}】式灵魂！

${writerDesc[name]}

#现代文学人格测试 #民国文气`;

    navigator.clipboard.writeText(text).then(() => {
        alert("✅ 已复制朋友圈文案！");
    }).catch(() => {
        prompt("复制文案：", text);
    });
}

renderStartPage();
</script>
